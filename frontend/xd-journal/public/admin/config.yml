      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Status", name: "status", widget: "select", options: ["draft", "published"], default: "published" }
      - { label: "ASCII Type", name: "asciiType", widget: "number", value_type: "int", min: 1, max: 10, default: 1 }
      - { label: "Source URL", name: "sourceUrl", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

