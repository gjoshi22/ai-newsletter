kind = "web"
previewPath = "/"
title = "XD AI Journal"
version = "1.0.0"
id = "artifacts/xd-journal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21879

[services.development]
run = "pnpm --filter @workspace/xd-journal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/xd-journal", "run", "build" ]
publicDir = "artifacts/xd-journal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21879"
BASE_PATH = "/"
