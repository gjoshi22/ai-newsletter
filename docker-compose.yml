services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: xd_journal
      POSTGRES_USER: xd_journal
      POSTGRES_PASSWORD: xd_journal
    ports:
      - "5432:5432"
    volumes:
      - xd_journal_pg:/var/lib/postgresql/data

volumes:
  xd_journal_pg:
